          if(isHuman && iconW > 0){
            const iconH = Math.min(36, p.height - 12);
            const iconCx = 8 + Math.round(iconW/2);
            const iconCy = p.height/2;
            const iconG = svgEl('g', { transform: `translate(${iconCx}, ${iconCy})` });
            const headR = Math.max(4, Math.round(iconH * 0.22));
            const head = svgEl('circle', { cx:0, cy: -Math.round(iconH * 0.18), r: headR, fill:'#fff', stroke:'#333', 'stroke-width':1 });
            const bodyTop = -Math.round(iconH * 0.18) + headR;
            const bodyBottom = Math.round(iconH * 0.28);
            const body = svgEl('line', { x1:0, y1: bodyTop, x2:0, y2: bodyBottom, stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const armLeft = svgEl('line', { x1: -Math.round(iconW * 0.45), y1: Math.round(iconH * 0.02), x2: 0, y2: Math.round(iconH * -0.05), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const armRight = svgEl('line', { x1: Math.round(iconW * 0.45), y1: Math.round(iconH * 0.02), x2: 0, y2: Math.round(iconH * -0.05), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const legLeft = svgEl('line', { x1:0, y1: bodyBottom, x2: -Math.round(iconW * 0.28), y2: Math.round(iconH * 0.5), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const legRight = svgEl('line', { x1:0, y1: bodyBottom, x2: Math.round(iconW * 0.28), y2: Math.round(iconH * 0.5), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            iconG.appendChild(head);
            iconG.appendChild(body);
            iconG.appendChild(armLeft);
            iconG.appendChild(armRight);
            iconG.appendChild(legLeft);
            iconG.appendChild(legRight);
            g.appendChild(rect);
            g.appendChild(iconG);
            g.appendChild(textEl);
          } else {
            g.appendChild(rect);
            g.appendChild(textEl);
          }
        } else {
          // centered label (default)
          const isHuman = !!n.human;
          const iconW = isHuman ? (n.iconWidth || 0) : 0;
          if(isHuman && iconW > 0){
            const iconH = Math.min(36, p.height - 12);
            const iconCx = 8 + Math.round(iconW/2);
            const iconCy = p.height/2;
            const iconG = svgEl('g', { transform: `translate(${iconCx}, ${iconCy})` });
            const headR = Math.max(4, Math.round(iconH * 0.22));
            const head = svgEl('circle', { cx:0, cy: -Math.round(iconH * 0.18), r: headR, fill:'#fff', stroke:'#333', 'stroke-width':1 });
            const bodyTop = -Math.round(iconH * 0.18) + headR;
            const bodyBottom = Math.round(iconH * 0.28);
            const body = svgEl('line', { x1:0, y1: bodyTop, x2:0, y2: bodyBottom, stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const armLeft = svgEl('line', { x1: -Math.round(iconW * 0.45), y1: Math.round(iconH * 0.02), x2: 0, y2: Math.round(iconH * -0.05), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const armRight = svgEl('line', { x1: Math.round(iconW * 0.45), y1: Math.round(iconH * 0.02), x2: 0, y2: Math.round(iconH * -0.05), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const legLeft = svgEl('line', { x1:0, y1: bodyBottom, x2: -Math.round(iconW * 0.28), y2: Math.round(iconH * 0.5), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            const legRight = svgEl('line', { x1:0, y1: bodyBottom, x2: Math.round(iconW * 0.28), y2: Math.round(iconH * 0.5), stroke:'#333', 'stroke-width':1.2, 'stroke-linecap':'round' });
            iconG.appendChild(head);
            iconG.appendChild(body);
            iconG.appendChild(armLeft);
            iconG.appendChild(armRight);
            iconG.appendChild(legLeft);
            iconG.appendChild(legRight);
            g.appendChild(rect);
            g.appendChild(iconG);
            const textX = Math.round(p.width/2 + iconW/2);
            const text = svgEl('text', { x: textX, y: p.height/2 + 5, 'text-anchor':'middle', 'font-size':14, 'font-family':'Inter, Arial, sans-serif', fill:'#111' });
            text.textContent = n.label;
            g.appendChild(text);
          } else {
            const text = svgEl('text', { x: p.width/2, y: p.height/2 + 5, 'text-anchor':'middle', 'font-size':14, 'font-family':'Inter, Arial, sans-serif', fill:'#111' });
            text.textContent = n.label;
            g.appendChild(rect);
            g.appendChild(text);
          }
        }

        // attach click / dblclick handlers (with small delay to distinguish)
        (function(id, grp){
          function onClick(e){
            e.stopPropagation();
            if(clickTimers.has(id)) return;
            const t = setTimeout(()=> {
              clickTimers.delete(id);
              const cur = colorMap.has(id) ? colorMap.get(id) : null;
              let idx = palette.findIndex(c => c === cur);
              if(idx === -1) idx = palette.length - 1;
              const next = (idx + 1) % palette.length;
              colorMap.set(id, palette[next]);
              debouncedRender();
              saveState();
            }, 250);
            clickTimers.set(id, t);
          }
          function onDblClick(e){
            e.stopPropagation();
            const t = clickTimers.get(id);
            if(t){ clearTimeout(t); clickTimers.delete(id); }
            colorMap.set(id, null);
            debouncedRender();
            saveState();
          }
          grp.addEventListener('click', onClick);
          grp.addEventListener('dblclick', onDblClick);
        })(n.id, g);
        nodesG.appendChild(g);
      } else if(n.kind === 'storage'){
        const g = svgEl('g', { transform: `translate(${p.x - p.width/2}, ${p.y - p.height/2})` });
        const fillColor = colorMap.has(n.id) ? (colorMap.get(n.id) || '#fff') : '#fff';
        if(n.multiple){
          const shadowRect = svgEl('rect', { x:-6, y:-6, width:p.width, height:p.height, rx:16, ry:16, fill: fillColor, stroke:'#333', 'stroke-width':1.5 });
          g.appendChild(shadowRect);
        }
        const rect = svgEl('rect', { x:0, y:0, width:p.width, height:p.height, rx:16, ry:16, fill: fillColor, stroke:'#333', 'stroke-width':1.5, filter:'url(#shadow)' });
        rect.setAttribute('style','cursor:pointer');

        if(parentSet.has(n.id)){
          // Parent storage: label at top-left so children don't overlap it
          const labelM = measureTextSVG(n.label, 14);
          const textEl = svgEl('text', { x: labelPadX, y: labelPadY + labelM.height, 'text-anchor':'start', 'font-size':14, 'font-family':'Inter, Arial, sans-serif', fill:'#111' });
          textEl.textContent = n.label;
          g.appendChild(rect);
          g.appendChild(textEl);
        } else {
          // Non-parent storage: centered label
          const text = svgEl('text', { x: p.width/2, y: p.height/2 + 5, 'text-anchor':'middle', 'font-size':14, 'font-family':'Inter, Arial, sans-serif', fill:'#111' });
          text.textContent = n.label;
          g.appendChild(rect);
          g.appendChild(text);
        }
        (function(id, grp){
          function onClick(e){
            e.stopPropagation();
            if(clickTimers.has(id)) return;
            const t = setTimeout(()=> {
              clickTimers.delete(id);
              const cur = colorMap.has(id) ? colorMap.get(id) : null;
              let idx = palette.findIndex(c => c === cur);
              if(idx === -1) idx = palette.length - 1;
              const next = (idx + 1) % palette.length;
              colorMap.set(id, palette[next]);
              debouncedRender();
              saveState();
            }, 250);
            clickTimers.set(id, t);
          }
          function onDblClick(e){
            e.stopPropagation();
            const t = clickTimers.get(id);
            if(t){ clearTimeout(t); clickTimers.delete(id); }
            colorMap.set(id, null);
            debouncedRender();
            saveState();
          }
          grp.addEventListener('click', onClick);
          grp.addEventListener('dblclick', onDblClick);
        })(n.id, g);
        nodesG.appendChild(g);
      }
    }

    // draw parents first then others
    // Use the deterministic depthMap computed earlier (BFS) to order parents:
    // - draw outermost parents first (depth asc) so inner parents appended later appear above
    // order parents outermost -> innermost using depthMap from resize phase
    const parents = Array.from(parentSet).map(id => nodeById[id]).filter(Boolean).sort((a,b) => (depthMap.get(a.id)||0) - (depthMap.get(b.id)||0));
    const others = nodes.filter(n => !parentSet.has(n.id));
    for(const pnode of parents) drawNode(pnode);
    for(const onode of others) drawNode(onode);

    // Fit-to-view: compute bbox from node positions and apply viewBox with padding
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const id in positions){
      const p = positions[id];
      const left = p.x - p.width/2, top = p.y - p.height/2, right = p.x + p.width/2, bottom = p.y + p.height/2;
      minX = Math.min(minX, left); minY = Math.min(minY, top);
      maxX = Math.max(maxX, right); maxY = Math.max(maxY, bottom);
    }
    if(minX === Infinity){
      minX = 0; minY = 0; maxX = 1000; maxY = 600;
    }
    const pad = 40;
    const vbX = minX - pad, vbY = minY - pad, vbW = (maxX - minX) + pad*2, vbH = (maxY - minY) + pad*2;
    svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);

    // show errors/summary
    const errs = Array.from(new Set(errors));
    ['assets-err','storages-err','connectors-err','inside-err'].forEach(id => { const e = $(id); if(e){ e.style.display='none'; e.textContent=''; }});
    if (errs.length) {
      summary.textContent = errs[0];
      // surface inside-specific errors in the Inside panel error div
      const insideErrors = errs.filter(s => s.toLowerCase().includes('inside'));
      if(insideErrors.length){
        const ie = $('inside-err');
        if(ie){ ie.style.display = 'block'; ie.textContent = insideErrors.join('; '); }
      }
    } else {
      summary.textContent = `${assets.length} assets • ${storages.length} storages • ${validConnectors.length} connectors • ${validFlows.length} flows`;
    }
  }

  const debouncedRender = debounce(render, 180);

  // color palette and state (hex codes; final null means no background)
  const palette = ['#dff7df', '#d8eaf7', '#f7d8ea', '#ffe8cc', null];
  const colorMap = new Map(); // id -> hex color string or null
  const clickTimers = new Map(); // id -> timeout

  // Export / Import helpers
  function buildExportText(){
    const parts = [
      '--- ASSETS ---',
      assetsTA.value || '',
      '',
      '--- STORAGES ---',
      storagesTA.value || '',
      '',
      '--- INSIDE ---',
      insideTA.value || '',
      '',
      '--- CONNECTORS ---',
      connectorsTA.value || ''
    ];
    // append COLORS section if any colors are set
    if(colorMap && colorMap.size){
      parts.push('', '--- COLORS ---');
      for(const [id, color] of colorMap){
        if(color) parts.push(`${id}: ${color}`);
      }
    }
    return parts.join('\n');
  }

  function downloadText(filename, text){
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // Generic blob downloader
  function downloadBlob(filename, blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // Export SVG to PNG and download
  function exportSvgToPng(filename){
    try{
      const svgEl = svg;
      // determine export size from viewBox if available, otherwise use element size
      let width, height;
      const vb = svgEl.getAttribute('viewBox');
      if(vb){
        const parts = vb.split(/\s+/).map(Number);
        if(parts.length === 4 && !parts.some(isNaN)){
          width = parts[2];
          height = parts[3];
        }
      }
      if(!width || !height){
        width = svgEl.clientWidth || 1000;
        height = svgEl.clientHeight || 600;
      }

      // Clone the SVG node to avoid mutations and serialize
      const clone = svgEl.cloneNode(true);
      // Ensure xmlns attribute exists
      if(!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(clone);
      const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.onload = () => {
        try{
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(width);
          canvas.height = Math.round(height);
          const ctx = canvas.getContext('2d');
          // white background
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((pngBlob) => {
            if(pngBlob) downloadBlob(filename, pngBlob);
            URL.revokeObjectURL(url);
          }, 'image/png');
        }catch(e){
          URL.revokeObjectURL(url);
          alert('Failed to render PNG: ' + e.message);
        }
      };
      img.onerror = () => { URL.revokeObjectURL(url); alert('Failed to load SVG data for PNG export'); };
      // Use a CORS-safe data URL by pointing image at blob URL
      img.src = url;
    }catch(e){
      alert('Export to PNG failed: ' + e.message);
    }
  }

  // Export raw SVG content as a .svg file
  function exportSvg(filename){
    try{
      const svgEl = svg;
      const clone = svgEl.cloneNode(true);
      if(!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      const serializer = new XMLSerializer();
      let svgStr = serializer.serializeToString(clone);
      // add XML prolog to improve compatibility
      if(!svgStr.startsWith('<?xml')) svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + svgStr;
      const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      downloadBlob(filename, svgBlob);
    }catch(e){
      alert('Export SVG failed: ' + e.message);
    }
  }

  function pad2(n){ return n.toString().padStart(2,'0'); }
  function defaultFilename(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}-elements.txt`;
  }

  function defaultPngFilename(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}-diagram.png`;
  }

  function defaultSvgFilename(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}-diagram.svg`;
  }

  function parseImportText(text){
    // Robust line-oriented import parser: scan for section markers and collect following lines until next marker.
    const norm = text.replace(/\r\n/g,'\n');
    const sections = { assets:'', storages:'', inside:'', connectors:'', flows:'', colors:'' };
    const markerRe = /^\s*---\s*(ASSETS|STORAGES|INSIDE|CONNECTORS|FLOWS|COLORS)\s*---\s*$/i;
    const lines = norm.split('\n');
    // default section if no leading marker
    let cur = 'assets';
    let seenAnyMarker = false;
    for(const rawLine of lines){
      const line = rawLine.replace(/\r/g,'');
      const m = line.match(markerRe);
      if(m){
        cur = m[1].toLowerCase();
        seenAnyMarker = true;
        // reset section content (in case of duplicate markers)
        sections[cur] = '';
        continue;
      }
      // If we haven't seen any marker yet, we stay in 'assets' (fallback)
      if(sections[cur].length === 0){
        sections[cur] = line;
      } else {
        sections[cur] += '\n' + line;
      }
    }
    // trim surrounding blank lines from each section
    for(const k of Object.keys(sections)){
      sections[k] = sections[k].replace(/^\n+|\n+$/g,'').replace(/\r/g,'');
    }
    // If no markers were present, the whole file goes to assets (already handled), but ensure exact trimming
    return sections;
  }

  function handleImportFileText(text){
    try{
      const secs = parseImportText(text);
      assetsTA.value = secs.assets;
      storagesTA.value = secs.storages;
      insideTA.value = secs.inside || '';
      // Merge connectors and flows (backward compat: old files have separate FLOWS section)
      const connParts = [secs.connectors, secs.flows].filter(Boolean);
      connectorsTA.value = connParts.join('\n');
      // parse COLORS (if present) and populate colorMap
      colorMap.clear();
      if(secs.colors){
        const lines = secs.colors.split(/\r?\n/);
        for(const l of lines){
          const line = l.trim();
          if(!line) continue;
          const m = line.match(/^([^:]+):\s*(#?[0-9a-fA-F]{6})\s*$/);
          if(!m) continue;
          let id = m[1].trim();
          let col = m[2].startsWith('#') ? m[2] : ('#' + m[2]);
          col = col.toLowerCase();
          colorMap.set(id, col);
        }
      }
      debouncedRender();
      prevAssetIds = getIdsByLine(assetsTA.value);
      prevStorageIds = getIdsByLine(storagesTA.value);
      saveState();
      // small non-blocking notification
      console.info('Import successful');
    }catch(e){
      alert('Import failed: ' + e.message);
    }
  }

  // attach UI handlers for export/import
    document.addEventListener('DOMContentLoaded', () => {
    const exportBtn = document.getElementById('export-btn');
    const exportSvgBtn = document.getElementById('export-svg-btn');
    const exportPngBtn = document.getElementById('export-png-btn');
    const importBtn = document.getElementById('import-btn');
    const importFile = document.getElementById('import-file');
    const clearBtn = document.getElementById('clear-btn');
    if(exportBtn){
      exportBtn.addEventListener('click', () => {
        const txt = buildExportText();
        downloadText(defaultFilename(), txt);
      });
    }
    if(exportSvgBtn){
      exportSvgBtn.addEventListener('click', () => {
        exportSvg(defaultSvgFilename());
      });
    }
    if(exportPngBtn){
      exportPngBtn.addEventListener('click', () => {
        exportSvgToPng(defaultPngFilename());
      });
    }
    if(importBtn && importFile){
      importBtn.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', (ev) => {
        const f = ev.target.files && ev.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = () => { handleImportFileText(String(reader.result)); importFile.value = ''; };
        reader.onerror = () => { alert('Failed to read file'); importFile.value = ''; };
        reader.readAsText(f, 'utf-8');
      });
 }
    if(clearBtn){
      clearBtn.addEventListener('click', () => {
        if(!window.confirm('Clear all left‑pane content and reset diagram? This cannot be undone.')) return;
        assetsTA.value = '';
        storagesTA.value = '';
        insideTA.value = '';
        connectorsTA.value = '';
        ['assets-err','storages-err','connectors-err','inside-err'].forEach(id => {
          const e = document.getElementById(id);
          if(e){ e.style.display = 'none'; e.textContent = ''; }
        });
        summary.textContent = '';
        colorMap.clear();
        debouncedRender();
        prevAssetIds = [];
        prevStorageIds = [];
        try{ localStorage.removeItem('tam-editor-state'); }catch(e){}
      });
    }
  });

  // attach events
  // helper: compute next numeric id for a given prefix from the textarea's existing lines
  function getNextNumericId(prefix, parsedLines){
    const used = new Set();
    for(const line of parsedLines){
      const p = parseIdLabel(line);
      if(!p) continue;
      const m = p.id.match(new RegExp('^' + prefix + '(\\d+)M?$', 'i'));
      if(m) used.add(Number(m[1]));
    }
    let n = 1;
    while(used.has(n)) n++;
    return prefix + n;
  }

  // helper: if the user typed a single ':' at the start of a new line, replace it with next id + ': '
  function handleAutoIdInsertion(ta, prefix){
    const selStart = ta.selectionStart;
    // find start of current line
    const before = ta.value.slice(0, selStart);
    const lastNewline = before.lastIndexOf('\n');
    const lineStart = lastNewline + 1;
    const lineSoFar = ta.value.slice(lineStart, selStart);
    // If the user just typed a single ':' at the start of the line (optionally after whitespace)
    if(lineSoFar.trim() === ':' && lineSoFar.replace(/\s/g,'') === ':'){
      // compute existing lines for this textarea
      const rawLines = ta.value.split(/\r?\n/);
      // find next id (prefix should be 'A' or 'S')
      const nextId = getNextNumericId(prefix, rawLines);
      const insert = nextId + ': ';
      // Replace only the leading ':' (preserve any leading whitespace on the line)
      const leadingWhitespaceMatch = ta.value.slice(lineStart).match(/^\s*/);
      const leadingWhitespace = leadingWhitespaceMatch ? leadingWhitespaceMatch[0] : '';
      const replaceStart = lineStart + leadingWhitespace.length;
      const newValue = ta.value.slice(0, replaceStart) + insert + ta.value.slice(selStart);
      const caretPos = replaceStart + insert.length;
      ta.value = newValue;
      // set caret after inserted space
      ta.setSelectionRange(caretPos, caretPos);
    }
  }

  // attach input handlers: decorate annotated editors on input, then re-render diagram
  [connectorsTA, insideTA].forEach(el => el.addEventListener('input', () => {
    decorateEditor(el);
    debouncedRender();
    saveState();
  }));
  // ensure auto-id insertion still runs for assets/storages; also re-decorate annotated editors
  // Track previous IDs for rename detection
  let prevAssetIds = getIdsByLine(assetsTA.value);
  let prevStorageIds = getIdsByLine(storagesTA.value);

  assetsTA.addEventListener('input', (e) => {
    handleAutoIdInsertion(assetsTA, 'A');
    const newIds = getIdsByLine(assetsTA.value);
    const renames = detectRenames(prevAssetIds, newIds);
    if(renames.length){
      applyRenames(insideTA, renames);
      applyRenames(connectorsTA, renames);
      for(const r of renames){
        if(colorMap.has(r.from)){ colorMap.set(r.to, colorMap.get(r.from)); colorMap.delete(r.from); }
      }
    }
    prevAssetIds = newIds;
    decorateEditor(insideTA); decorateEditor(connectorsTA); debouncedRender();
    saveState();
  });
  storagesTA.addEventListener('input', (e) => {
    handleAutoIdInsertion(storagesTA, 'S');
    const newIds = getIdsByLine(storagesTA.value);
    const renames = detectRenames(prevStorageIds, newIds);
    if(renames.length){
      applyRenames(insideTA, renames);
      applyRenames(connectorsTA, renames);
      for(const r of renames){
        if(colorMap.has(r.from)){ colorMap.set(r.to, colorMap.get(r.from)); colorMap.delete(r.from); }
      }
    }
    prevStorageIds = newIds;
    decorateEditor(insideTA); decorateEditor(connectorsTA); debouncedRender();
    saveState();
  });

  // initial render (seed default colors then render)
  colorMap.set('A3M', '#dff7df');
  colorMap.set('H1', '#f7d8ea');
  colorMap.set('H2', '#d8eaf7');
  // Restore saved colors (overrides defaults)
  try{
    const saved = JSON.parse(localStorage.getItem('tam-editor-state'));
    if(saved && saved.colors){
      colorMap.clear();
      for(const [k,v] of Object.entries(saved.colors)) colorMap.set(k, v);
    }
  }catch(e){}
  window.addEventListener('load', () => { debouncedRender(); });
  window.__diagramRender = render;

  // --- Resizable left sidebar ---
  (function initResize(){
    const handle = document.getElementById('resize-handle');
    const left = document.querySelector('.left');
    if(!handle || !left) return;
    let startX, startW;
    handle.addEventListener('pointerdown', function(e){
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      handle.classList.add('dragging');
      startX = e.clientX;
      startW = left.getBoundingClientRect().width;
      document.body.style.userSelect = 'none';
    });
    handle.addEventListener('pointermove', function(e){
      if(!handle.classList.contains('dragging')) return;
      const w = Math.min(600, Math.max(200, startW + (e.clientX - startX)));
      left.style.width = w + 'px';
    });
    function stopDrag(e){
      if(!handle.classList.contains('dragging')) return;
      handle.classList.remove('dragging');
      document.body.style.userSelect = '';
    }
    handle.addEventListener('pointerup', stopDrag);
    handle.addEventListener('pointercancel', stopDrag);
  })();
})();
</script>
